<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Results - 229-231 King Georges Rd, Roselands</title>
<style>
body{font-family:Arial;background:#5f7a94;min-height:100vh;padding:20px;margin:0}
.container{max-width:1200px;margin:0 auto;background:white;border-radius:15px;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,0.2)}
.header{background:linear-gradient(135deg,#66bb6a,#388e3c);color:white;padding:30px;text-align:center}
.header h1{font-size:2em;margin:0}
.header h2{font-size:1.4em;margin:10px 0 0 0}
.content{padding:30px}
.week-header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:15px 20px;border-radius:10px;margin:25px 0 15px 0;font-size:1.1em;font-weight:bold;display:flex;justify-content:space-between;align-items:center}
.day-section{margin-bottom:20px;border:1px solid #eee;border-radius:10px;overflow:hidden}
.day-header{background:#f5f5f5;padding:12px 20px;font-weight:bold;color:#333;border-bottom:1px solid #eee}
.task-row{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid #f5f5f5}
.task-row:last-child{border-bottom:none}
.task-row-label{flex:1;font-size:0.9em;color:#333}
.section-label{grid-column:1/-1;font-size:0.75em;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#00695c;background:#e0f2f1;padding:6px 10px;border-radius:4px;margin-top:6px}
.r-cal-container{margin-bottom:20px}
.r-cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;gap:8px}
.r-cal-title{font-size:1.3em;font-weight:bold;color:#333;text-align:center;flex:1}
.r-cal-btn{padding:9px 22px;border:none;border-radius:6px;background:#66bb6a;color:white;cursor:pointer;font-weight:bold;font-size:0.95em}
.r-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.r-cal-day-header{text-align:center;font-weight:bold;color:#666;padding:10px 0;font-size:0.9em}
.r-cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all 0.2s;background:#f5f5f5;font-size:0.95em}
.r-cal-day:hover{border-color:#66bb6a;background:#e8f5e9}
.r-cal-day.empty{background:transparent;cursor:default}
.r-cal-day.empty:hover{border-color:transparent;background:transparent}
.r-cal-day.has-sub{background:#c8e6c9;border-color:#4caf50}
.r-cal-day.has-sub:hover{background:#a5d6a7}
.r-cal-day.today{border-color:#388e3c;border-width:3px}
.r-cal-day.range-start,.r-cal-day.range-end{background:#a5d6a7;color:#1b5e20;border-color:#66bb6a}
.r-cal-day .day-number{font-size:1.1em;font-weight:bold}
.r-cal-day .day-indicator{font-size:0.7em;margin-top:2px}
.r-cal-btn:disabled{background:#ccc;cursor:not-allowed}
.r-cal-legend{display:flex;gap:20px;margin-top:15px;justify-content:center;flex-wrap:wrap}
.r-cal-legend-item{display:flex;align-items:center;gap:5px;font-size:0.85em;color:#666}
.r-cal-legend-box{width:16px;height:16px;border-radius:4px}
.task-freq{font-size:0.8em;color:#888;margin-right:10px;white-space:nowrap}
.resp-badge{padding:3px 12px;border-radius:12px;font-size:0.8em;font-weight:bold;white-space:nowrap}
.resp-badge.yes{background:#d4edda;color:#155724}
.resp-badge.no{background:#f8d7da;color:#721c24}
.resp-badge.blank{background:#f5f5f5;color:#999}
a.back-link{display:inline-block;margin-bottom:20px;color:#667eea;text-decoration:none;font-weight:bold}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>Submission Results</h1>
<h2>229-231 King Georges Rd, Roselands</h2>
</div>
<div class="content">
<a href="229-231-king-georges-rd-roselands-form.html" class="back-link">← Back to Form</a>
<div id="rCalendarView"></div>
<div id="resultsArea"><p style="color:#999;text-align:center;padding:40px">Select a day to view submissions</p></div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SUPABASE_URL="https://hkrktfmvxgctjeivmobz.supabase.co";
var SUPABASE_KEY="sb_publishable_a5_CAmMfSQrlVzUy3YhUWw_IQHb4RBy";
var SITE_ID="229-231-king-georges-rd-roselands";
var supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
var SITE_NOTES="";
if(SITE_NOTES){var nb=document.getElementById("notesBox");if(nb){nb.innerHTML="<div class=\"notes-box\">"+SITE_NOTES.replace(/\n/g,"<br>")+"</div>";}}
var questions=[
{type:"task",id:"q1",label:"Vacuuming and mopping floors - Weekly",frq:""},
{type:"task",id:"q2",label:"Polishing foyer glass doors and glass panels - Weekly",frq:""},
{type:"task",id:"q3",label:"Wiping down balustrades, handrails, power points, light switches & light fitting - Weekly",frq:""},
{type:"task",id:"q4",label:"Cleaning internal windows and windowsills - Weekly",frq:""},
{type:"task",id:"q5",label:"Removing cobwebs throughout the SP, internally and externally - Weekly",frq:""},
{type:"task",id:"q6",label:"Collecting rubbish throughout the SP, internally and externally - Weekly",frq:""},
{type:"task",id:"q7",label:"Wiping down intercoms - Weekly",frq:""},
{type:"task",id:"q8",label:"Wiping down letterboxes and removing junk mail - Weekly",frq:""},
{type:"task",id:"q9",label:"Deodorising hallways - Weekly",frq:""},
{type:"task",id:"q10",label:"Removing marks from walls (where possible) - As required",frq:""},
{type:"task",id:"q11",label:"Clearing stormwater drains - Weekly",frq:""},
{type:"task",id:"q12",label:"Air blowing footpath and driveway, and collecting foliage - Weekly",frq:""},
{type:"task",id:"q13",label:"Relocating bins for collections and returning the next day, Monday to Tuesday - Weekly",frq:""},
{type:"task",id:"q14",label:"Washing bins and bin area - Weekly",frq:""},
{type:"task",id:"q15",label:"Maintaining one onsite toilet and topping up with consumables - Weekly",frq:""}
];
var today=new Date();
var rCurrentMonth=new Date(today.getFullYear(),today.getMonth(),1);
var rSubDates={};
var rSelectedDay=null;
function rRenderCalendar(){
var y=rCurrentMonth.getFullYear(),m=rCurrentMonth.getMonth();
var first=new Date(y,m,1),last=new Date(y,m+1,0);
var start=first.getDay();if(start===0)start=7;
var days=last.getDate();
var mn=["January","February","March","April","May","June","July","August","September","October","November","December"];
var canN=(y<today.getFullYear())||(y===today.getFullYear()&&m<today.getMonth());
var html="<div class=\"r-cal-container\"><div class=\"r-cal-header\">";
html+="<button type=\"button\" class=\"r-cal-btn\" onclick=\"rPrevMonth()\">&#8592; Prev</button>";
html+="<span class=\"r-cal-title\">"+mn[m]+" "+y+"</span>";
html+="<button type=\"button\" class=\"r-cal-btn\" onclick=\"rNextMonth()\" "+(canN?"":"disabled")+">Next &#8594;</button></div>";
html+="<div class=\"r-cal-grid\">";
var dh=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
dh.forEach(function(d){html+="<div class=\"r-cal-day-header\">"+d+"</div>";});
for(var i=1;i<start;i++)html+="<div class=\"r-cal-day empty\"></div>";
for(var day=1;day<=days;day++){
var dt=new Date(y,m,day);
var dk=y+"-"+String(m+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
var isT=dt.toDateString()===today.toDateString(),hasSub=rSubDates[dk];
var isSel=rSelectedDay===dk;
var cls="r-cal-day";
if(isSel)cls+=" range-start";
if(isT)cls+=" today";if(hasSub)cls+=" has-sub";
html+="<div class=\""+cls+"\" onclick=\"rSelectDay('"+dk+"')\"><span class=\"day-number\">"+day+"</span>";
if(hasSub)html+="<span class=\"day-indicator\">&#10003;</span>";
html+="</div>";}
html+="</div><div class=\"r-cal-legend\">";
html+="<div class=\"r-cal-legend-item\"><div class=\"r-cal-legend-box\" style=\"background:#c8e6c9;border:1px solid #4caf50\"></div>Has submission</div>";
html+="<div class=\"r-cal-legend-item\"><div class=\"r-cal-legend-box\" style=\"background:#a5d6a7;border:1px solid #66bb6a\"></div>Selected</div>";
html+="<div class=\"r-cal-legend-item\"><div class=\"r-cal-legend-box\" style=\"background:#f5f5f5;border:3px solid #388e3c\"></div>Today</div>";
html+="</div></div>";
document.getElementById("rCalendarView").innerHTML=html;}
function rPrevMonth(){rCurrentMonth.setMonth(rCurrentMonth.getMonth()-1);rLoadSubDates();}
function rNextMonth(){var n=new Date(rCurrentMonth);n.setMonth(n.getMonth()+1);if(n<=today){rCurrentMonth=n;rLoadSubDates();}}
function rSelectDay(dk){rSelectedDay=dk;rRenderCalendar();loadResults(dk);}
async function rLoadSubDates(){
var y=rCurrentMonth.getFullYear(),m=rCurrentMonth.getMonth();
var s=new Date(y,m,1,0,0,0).toISOString(),e=new Date(y,m+1,0,23,59,59).toISOString();
try{var r=await supabase.from("submissions").select("timestamp").eq("site_id",SITE_ID).gte("timestamp",s).lte("timestamp",e);
rSubDates={};if(r.data){r.data.forEach(function(sub){var d=new Date(sub.timestamp);
var k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");rSubDates[k]=true;});}
rRenderCalendar();}catch(e){rRenderCalendar();}}
rLoadSubDates();
async function loadResults(dk){
if(!dk){document.getElementById("resultsArea").innerHTML="<p style='color:#999;text-align:center;padding:40px'>Select a day to view submissions</p>";return;}
document.getElementById("resultsArea").innerHTML="<p style='color:#999;text-align:center;padding:20px'>Loading...</p>";
var s=new Date(dk+"T00:00:00").toISOString(),e=new Date(dk+"T23:59:59").toISOString();
try{var r=await supabase.from("submissions").select("*").eq("site_id",SITE_ID).gte("timestamp",s).lte("timestamp",e).order("timestamp",{ascending:false});
if(r.error||!r.data){document.getElementById("resultsArea").innerHTML="<p style='color:#999;text-align:center;padding:40px'>No entries for selected day</p>";return;}
renderResults(r.data||[]);}
catch(e){document.getElementById("resultsArea").innerHTML="<p style='color:#999;text-align:center;padding:40px'>No entries for selected day</p>";}}
function renderResults(data){
if(!data.length){document.getElementById("resultsArea").innerHTML="<p style='color:#999;text-align:center;padding:40px'>No entries for selected day</p>";return;}
var html="";
data.forEach(function(sub){
var d=new Date(sub.timestamp);
var ds=d.toLocaleDateString("en-AU",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
var ts=d.toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit"});
var resp=sub.responses||{};
html+='<div class="day-section"><div class="day-header">'+ds+' &mdash; '+ts+'</div>';
questions.forEach(function(q){
if(q.type==="heading"){html+='<div class="section-label">'+q.label+'</div>';return;}
var v=resp[q.id];
var isY=(v===true||v==="true"),isN=(v===false||v==="false");
var badge=isY?'<span class="resp-badge yes">Yes</span>':
         isN?'<span class="resp-badge no">No</span>':
         '<span class="resp-badge blank">&mdash;</span>';
var frqLabel=q.frq?'<span class="task-freq">'+q.frq+'</span>':'';
html+='<div class="task-row"><span class="task-row-label">'+q.label+'</span>'+frqLabel+badge+'</div>';
});
html+='</div>';
});
document.getElementById("resultsArea").innerHTML=html;}
loadResults();
</script>
</body>
</html>
