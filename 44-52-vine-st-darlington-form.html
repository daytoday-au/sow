<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Form - 44-52 Vine St, Darlington</title>
<style>
body{font-family:Arial;background:#5f7a94;min-height:100vh;padding:20px;margin:0}
.container{max-width:900px;margin:0 auto;background:white;border-radius:15px;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,0.2)}
.header{background:linear-gradient(135deg,#4facfe,#00f2fe);color:white;padding:30px;text-align:center}
.header h1{font-size:1.6em;margin:0}
.header h2{font-size:1.2em;margin:10px 0 0 0}
.content{padding:30px}
.question{display:flex;justify-content:space-between;align-items:center;padding:15px;margin:8px 0;background:#f9f9f9;border-radius:8px}
.question label{flex:1;font-size:1em;line-height:1.4;padding-right:15px}
.buttons{display:flex;gap:8px;flex-shrink:0}
.btn{padding:8px 20px;border:none;border-radius:20px;font-weight:bold;cursor:pointer;font-size:0.95em}
.btn-yes{background:#4caf50;color:white}
.btn-no{background:#f44336;color:white}
.btn.active{box-shadow:0 0 0 3px rgba(0,0,0,0.2);transform:scale(1.05)}
.btn.inactive{background:#ccc;opacity:0.5}
.submit-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:15px 40px;border:none;border-radius:25px;font-size:1.1em;font-weight:bold;cursor:pointer;margin:20px auto;display:block}
.message{padding:15px;margin-bottom:20px;border-radius:8px;text-align:center;font-weight:bold}
.success{background:#d4edda;color:#155724}
.error{background:#f8d7da;color:#721c24}
.link-box{background:#e3f2fd;padding:15px;border-radius:8px;margin-top:20px;text-align:center}
.link-box a{color:#1976d2;text-decoration:none;font-weight:bold;font-size:1.1em}
.section-header{font-size:0.8em;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:#00695c;background:#e0f2f1;padding:10px 15px;margin:18px 0 6px 0;border-radius:6px;border-left:4px solid #00acc1}
.notes-box{background:#fff8e1;border-left:4px solid #ffc107;padding:12px 16px;border-radius:6px;margin-bottom:18px;font-size:0.92em;color:#555;white-space:pre-wrap;line-height:1.5}
.calendar-container{margin-bottom:20px}
.calendar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;gap:8px}
.calendar-title{font-size:1.3em;font-weight:bold;color:#333;text-align:center;flex:1}
.cal-btn{padding:9px 22px;border:none;border-radius:6px;background:#667eea;color:white;cursor:pointer;font-weight:bold;font-size:0.95em}
.cal-btn:disabled{background:#ccc;cursor:not-allowed}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.calendar-day-header{text-align:center;font-weight:bold;color:#666;padding:10px 0;font-size:0.9em}
.calendar-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all 0.2s;background:#f5f5f5}
.calendar-day:hover{border-color:#667eea;background:#e3f2fd}
.calendar-day.empty{background:transparent;cursor:default}
.calendar-day.empty:hover{border-color:transparent;background:transparent}
.calendar-day.has-submission{background:#c8e6c9;border-color:#4caf50}
.calendar-day.has-submission:hover{background:#a5d6a7}
.calendar-day.today{border-color:#667eea;border-width:3px}
.calendar-day.selected{background:#667eea;color:white}
.calendar-day.selected:hover{background:#764ba2}
.calendar-day.future{background:#eee;color:#aaa;cursor:not-allowed}
.calendar-day.future:hover{border-color:transparent;background:#eee}
.calendar-day .day-number{font-size:1.1em;font-weight:bold}
.calendar-day .day-indicator{font-size:0.7em;margin-top:2px}
.calendar-legend{display:flex;gap:20px;margin-top:15px;justify-content:center;flex-wrap:wrap}
.calendar-legend-item{display:flex;align-items:center;gap:5px;font-size:0.85em;color:#666}
.calendar-legend-box{width:16px;height:16px;border-radius:4px}
.back-btn{background:#999;color:white;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;margin-bottom:20px}
.selected-date-display{background:#e3f2fd;padding:15px;border-radius:8px;margin-bottom:20px;text-align:center}
.selected-date-display strong{color:#667eea;font-size:1.1em}
.back-btn{background:#999;color:white;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;margin-bottom:20px}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>Daytoday Real Time SOW Status Form</h1>
<h2>Site: 44-52 Vine St, Darlington</h2>
<p id="formDate" style="margin:10px 0 0 0;font-size:1em;opacity:0.9"></p>
</div>
<div class="content">
<div id="calendarView"></div>
<div id="formView" style="display:none">
<button type="button" class="back-btn" onclick="showCalendar()">← Back to Calendar</button>
<div id="selectedDateDisplay" class="selected-date-display"></div>
<div id="notesBox"></div>
<div id="msg"></div>
<div id="form"></div>
<button class="submit-btn" onclick="submitForm()">Submit Form</button>
</div>
<div class="link-box"><p style="margin:0 0 10px 0">Want to view submission history?</p><a href="44-52-vine-st-darlington-results.html">Open Results Viewer →</a></div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SUPABASE_URL="https://hkrktfmvxgctjeivmobz.supabase.co";
var SUPABASE_KEY="sb_publishable_a5_CAmMfSQrlVzUy3YhUWw_IQHb4RBy";
var SITE_ID="44-52-vine-st-darlington";
var SITE_NAME="44-52 Vine St, Darlington";
var supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
var SITE_NOTES="";
if(SITE_NOTES){var nb=document.getElementById("notesBox");if(nb){nb.innerHTML="<div class=\"notes-box\">"+SITE_NOTES.replace(/\n/g,"<br>")+"</div>";}}
var questions=[
{type:"task",id:"q1",label:"Vacuuming and mopping floors. External tiled stairs and landing leading to the units on Vine St are included - Fortnightly",frq:""},
{type:"task",id:"q2",label:"Polishing foyer glass doors and glass panels, x2 foyers - Fortnightly",frq:""},
{type:"task",id:"q3",label:"Wiping down common door handles - Fortnightly",frq:""},
{type:"task",id:"q4",label:"Wiping down balustrades, handrails, skirting boards, power points, light switches - Fortnightly",frq:""},
{type:"task",id:"q5",label:"Wiping down light fittings - As required",frq:""},
{type:"task",id:"q6",label:"Cleaning internal windows and windowsills - Fortnightly",frq:""},
{type:"task",id:"q7",label:"Removing cobwebs throughout the SP, internally and externally - Fortnightly",frq:""},
{type:"task",id:"q8",label:"Collecting rubbish throughout the SP, internally and externally - Fortnightly",frq:""},
{type:"task",id:"q9",label:"Wiping down intercoms - Fortnightly",frq:""},
{type:"task",id:"q10",label:"Wiping down letterboxes and removing junk mail - Fortnightly",frq:""},
{type:"task",id:"q11",label:"Deodorising hallways - Fortnightly",frq:""},
{type:"task",id:"q12",label:"Removing marks from walls (where possible) - As required",frq:""},
{type:"task",id:"q13",label:"Wiping down common doors, fire doors included - As required",frq:""},
{type:"task",id:"q14",label:"Clearing stormwater drains - Fortnightly",frq:""},
{type:"task",id:"q15",label:"Air blowing footpath and driveway, and collecting foliage. Areas around Vine Lane at the back are included- Fortnightly",frq:""},
{type:"task",id:"q16",label:"Tidying up the bin room - Fortnightly",frq:""},
{type:"task",id:"q17",label:"Maintaining one onsite toilet and topping up with consumables (the price of consumables is excluded) - Fortnightly",frq:""},
{type:"task",id:"q18",label:"Washing the carpark, x 2 carparks - Half yearly",frq:""},
{type:"task",id:"q19",label:"Heavy-duty scrubbing of all tiles, External tiled stairs and landing leading to the units on Vine St are included. - Half yearly",frq:""}
];
var answers={};
var selectedDate=null;
var submissionDates={};
var currentMonth=new Date();
var today=new Date();
today.setHours(0,0,0,0);
function renderCalendar(){
var y=currentMonth.getFullYear(),m=currentMonth.getMonth();
var first=new Date(y,m,1),last=new Date(y,m+1,0);
var start=first.getDay();if(start===0)start=7;
var days=last.getDate();
var mn=["January","February","March","April","May","June","July","August","September","October","November","December"];
var canP=(y>today.getFullYear()-1)||(y===today.getFullYear()-1&&m>=today.getMonth());
var canN=(y<today.getFullYear())||(y===today.getFullYear()&&m<today.getMonth());
var html="<div class=\"calendar-container\"><div class=\"calendar-header\">";
html+="<button type=\"button\" class=\"cal-btn\" onclick=\"prevMonth()\">&#8592; Prev</button>";
html+="<span class=\"calendar-title\">"+mn[m]+" "+y+"</span>";
html+="<button type=\"button\" class=\"cal-btn\" onclick=\"nextMonth()\" "+(canN?"":"disabled")+">Next &#8594;</button></div>";
html+="<div class=\"calendar-grid\">";
var dh=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
dh.forEach(function(d){html+="<div class=\"calendar-day-header\">"+d+"</div>";});
for(var i=1;i<start;i++)html+="<div class=\"calendar-day empty\"></div>";
for(var day=1;day<=days;day++){
var dt=new Date(y,m,day);
var dk=y+"-"+String(m+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
var isT=dt.getTime()===today.getTime(),isF=dt>today,hasSub=submissionDates[dk];
var cls="calendar-day";
if(isT)cls+=" today";if(isF)cls+=" future";else if(hasSub)cls+=" has-submission";
var oc=isF?"":"onclick=\"selectDate('"+dk+"',"+y+","+m+","+day+")\";";
html+="<div class=\""+cls+"\" "+oc+"><span class=\"day-number\">"+day+"</span>";
if(hasSub)html+="<span class=\"day-indicator\">✓</span>";
html+="</div>";}
html+="</div><div class=\"calendar-legend\">";
html+="<div class=\"calendar-legend-item\"><div class=\"calendar-legend-box\" style=\"background:#c8e6c9;border:1px solid #4caf50\"></div>Has submission</div>";
html+="<div class=\"calendar-legend-item\"><div class=\"calendar-legend-box\" style=\"background:#f5f5f5;border:3px solid #667eea\"></div>Today</div>";
html+="</div></div>";
document.getElementById("calendarView").innerHTML=html;}
function prevMonth(){currentMonth.setMonth(currentMonth.getMonth()-1);loadSubmissionDates();}
function nextMonth(){var n=new Date(currentMonth);n.setMonth(n.getMonth()+1);
if(n<=today){currentMonth=n;loadSubmissionDates();}}
function selectDate(dk,y,m,day){selectedDate=new Date(y,m,day);answers={};loadSubmissionForDate(dk);}
function showCalendar(){document.getElementById("calendarView").style.display="block";document.getElementById("formView").style.display="none";loadSubmissionDates();}
function showForm(){document.getElementById("calendarView").style.display="none";document.getElementById("formView").style.display="block";
var opts={weekday:"long",year:"numeric",month:"long",day:"numeric"};
document.getElementById("selectedDateDisplay").innerHTML="<strong>Editing: "+selectedDate.toLocaleDateString("en-AU",opts)+"</strong>";
renderForm();}
function loadSubmissionDates(){
var y=currentMonth.getFullYear(),m=currentMonth.getMonth();
var s=new Date(y,m,1,0,0,0).toISOString(),e=new Date(y,m+1,0,23,59,59).toISOString();
(async function(){try{var r=await supabase.from("submissions").select("timestamp").eq("site_id",SITE_ID).gte("timestamp",s).lte("timestamp",e);
submissionDates={};if(r.data){r.data.forEach(function(sub){var d=new Date(sub.timestamp);
var k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");submissionDates[k]=true;});}
renderCalendar();}catch(e){renderCalendar();}})();}
function loadSubmissionForDate(dk){
var p=dk.split("-"),y=parseInt(p[0]),m=parseInt(p[1])-1,day=parseInt(p[2]);
var s=new Date(y,m,day,0,0,0).toISOString(),e=new Date(y,m,day,23,59,59,999).toISOString();
(async function(){try{var r=await supabase.from("submissions").select("*").eq("site_id",SITE_ID).gte("timestamp",s).lte("timestamp",e).order("created_at",{ascending:false}).limit(1);
answers={};if(r.data&&r.data.length>0){var lr=r.data[0].responses;for(var k in lr)answers[k]=(lr[k]===true||lr[k]==="true");}
showForm();}catch(e){showForm();}})();}
function renderForm(){var html="";for(var i=0;i<questions.length;i++){var q=questions[i];
if(q.type==="heading"){html+="<div class=\"section-header\">"+q.label+"</div>";continue;}
var ans=answers[q.id];var yc=(ans===true)?"active":((ans===false)?"inactive":"");
var nc=(ans===false)?"active":((ans===true)?"inactive":"");
html+="<div class=\"question\"><label>"+q.label+"</label><div class=\"buttons\">";
html+="<button type=\"button\" class=\"btn btn-yes "+yc+"\" onclick=\"setAnswer('"+q.id+"',true)\">Yes</button>";
html+="<button type=\"button\" class=\"btn btn-no "+nc+"\" onclick=\"setAnswer('"+q.id+"',false)\">No</button>";
html+="</div></div>";}
document.getElementById("form").innerHTML=html;}
function setAnswer(qid,val){answers[qid]=val;renderForm();}
function showMsg(t,type){var b=document.getElementById("msg");b.innerHTML="<div class=\"message "+type+"\">"+t+"</div>";
if(type==="success")setTimeout(function(){b.innerHTML="";},3000);}
function submitForm(){var missing=[];
for(var i=0;i<questions.length;i++){if(questions[i].type==="heading")continue;if(answers[questions[i].id]===undefined)missing.push(questions[i]);}
if(missing.length>0){showMsg("Please answer all questions ("+missing.length+" remaining)","error");return;}
var ts=new Date(selectedDate);ts.setHours(12,0,0,0);
(async function(){try{var r=await supabase.from("submissions").insert({site_id:SITE_ID,site_name:SITE_NAME,responses:answers,timestamp:ts.toISOString()});
if(r.error){showMsg("Error: "+r.error.message,"error");}else{alert("Form submitted successfully!");showCalendar();}}
catch(e){showMsg("Error: "+e.message,"error");}})();}
document.getElementById("formDate").textContent="Select a date to submit or edit";
loadSubmissionDates();
</script>
</body>
</html>
